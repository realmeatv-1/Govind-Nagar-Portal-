{% extends 'base.html' %}
{% block content %}
<h3>Yearly Maintenance Payments</h3>
<div class="card">
  <form method="post" class="grid-form">
    <select name="user_id" required>{% for m in members %}<option value="{{m.id}}">{{m.name}} - {{m.address}}</option>{% endfor %}</select>
    <input name="year" type="number" value="{{ 2026 }}" required>
    <input name="amount" type="number" step="0.01" required>
    <input name="paid_on" type="date" required>
    <select name="method"><option>cash</option><option>upi</option></select>
    <select name="status"><option>paid</option><option>pending</option><option>overdue</option></select>
    <input name="notes" placeholder="Notes">
    <button>Save Payment</button>
  </form>
</div>
<div class="card">
  <table><tr><th>Member</th><th>Year</th><th>Amount</th><th>Date</th><th>Method</th><th>Status</th></tr>
  {% for p in payments %}<tr><td>{{p.member.name}}</td><td>{{p.year}}</td><td>₹{{p.amount}}</td><td>{{p.paid_on}}</td><td>{{p.method}}</td><td>{{p.status}}</td></tr>{% endfor %}
  </table>
</div>
{% endblock %}
